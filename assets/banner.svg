<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">herald — agent- and terminal-agnostic notification dispatcher</title>
  <desc id="d">A megaphone broadcasts waves that become notification cards: an attention card delivered, a turn-complete card delivered, and one suppressed because the terminal is focused.</desc>
  <defs>
    <radialGradient id="glowAmber" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 30) rotate(115) scale(430 560)">
      <stop stop-color="#d9a13d" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#d9a13d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCool" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(90 380) rotate(-35) scale(420 520)">
      <stop stop-color="#7fa8c9" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#7fa8c9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardEdge" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#3f3826"/>
      <stop offset="1" stop-color="#2b2617"/>
    </linearGradient>
  </defs>

  <!-- plaque -->
  <rect x="1" y="1" width="1278" height="398" rx="20" fill="#131009"/>
  <rect x="1" y="1" width="1278" height="398" rx="20" fill="url(#glowAmber)"/>
  <rect x="1" y="1" width="1278" height="398" rx="20" fill="url(#glowCool)"/>
  <rect x="1" y="1" width="1278" height="398" rx="20" stroke="#3a3423" stroke-width="1.5"/>

  <!-- ── left column: wordmark ─────────────────────────────────────────── -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, 'Cascadia Mono', Consolas, monospace">
    <!-- eyebrow -->
    <rect x="86" y="103" width="9" height="9" transform="rotate(45 90.5 107.5)" fill="#d9a13d"/>
    <text x="112" y="112" font-size="14" letter-spacing="3.5" fill="#d9a13d">NOTIFICATIONS FOR AI CODING AGENTS</text>

    <!-- wordmark + terminal cursor -->
    <text x="82" y="216" font-size="102" font-weight="600" letter-spacing="-2" fill="#f1eee2">herald</text>
    <rect x="468" y="140" width="17" height="76" fill="#d9a13d">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="2.2s" repeatCount="indefinite"/>
    </rect>

    <!-- tagline -->
    <text x="86" y="262" font-size="19" fill="#b9b19c">agent- &amp; terminal-agnostic notification dispatcher</text>

    <!-- pipeline -->
    <text x="86" y="306" font-size="15" fill="#857c66">any agent ─▶ canonical event ─▶ routing ─▶ wherever you're looking</text>

    <!-- stat line -->
    <text x="86" y="352" font-size="13" letter-spacing="1" fill="#6f6754">rust · fail-open · focus-aware · macOS 26-proof · MIT</text>
  </g>

  <!-- ── megaphone (Iconoir) + broadcast arcs ─────────────────────────── -->
  <g transform="translate(628 122) scale(5.4)" stroke="#d9a13d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke">
    <path vector-effect="non-scaling-stroke" d="M18 8C18 8 19 8.5 19 10C19 11.5 18 12 18 12M20.5 5C20.5 5 22.5 6 22.5 10C22.5 14 20.5 15 20.5 15M2 13.3333V6.66667C2 6.29848 2.29848 6 2.66667 6H10.5757C10.7096 6 10.8404 5.95964 10.951 5.88415L15.2933 2.92073C15.7415 2.61489 16.35 2.93591 16.35 3.47858V16.5214C16.35 17.0641 15.7415 17.3851 15.2933 17.0793L10.951 14.1158C10.8404 14.0404 10.7096 14 10.5757 14H9V19.5C9 20.0523 8.55228 20.5 8 20.5H6C5.44772 20.5 5 20.0523 5 19.5V14H2.66667C2.29848 14 2 13.7015 2 13.3333Z"/>
  </g>
  <g stroke="#d9a13d" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M 800 145 A 48 48 0 0 1 800 229" opacity="0.45"/>
    <path d="M 816 117 A 80 80 0 0 1 816 257" opacity="0.28"/>
    <path d="M 832 89  A 112 112 0 0 1 832 285" opacity="0.14"/>
  </g>

  <!-- ── notification cards ────────────────────────────────────────────── -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, 'Cascadia Mono', Consolas, monospace">
    <!-- card 1: attention, delivered -->
    <g transform="translate(880 62)">
      <rect width="330" height="78" rx="14" fill="#201b10" stroke="url(#cardEdge)" stroke-width="1.5"/>
      <rect width="3" height="78" rx="1.5" fill="#d9a13d"/>
      <circle cx="30" cy="39" r="7" fill="#d9a13d"/>
      <circle cx="30" cy="39" r="12" stroke="#d9a13d" stroke-opacity="0.35" fill="none"/>
      <text x="52" y="34" font-size="13.5" font-weight="600" fill="#f1eee2">Claude Code — acme</text>
      <text x="52" y="56" font-size="12" fill="#8f8672">Needs your permission to use Bash</text>
      <text x="314" y="26" font-size="10.5" letter-spacing="1" text-anchor="end" fill="#d9a13d">ATTENTION</text>
    </g>

    <!-- card 2: turn complete, delivered -->
    <g transform="translate(902 160)">
      <rect width="330" height="78" rx="14" fill="#201b10" stroke="url(#cardEdge)" stroke-width="1.5"/>
      <rect width="3" height="78" rx="1.5" fill="#8fb87a"/>
      <circle cx="30" cy="39" r="7" fill="#8fb87a"/>
      <text x="52" y="34" font-size="13.5" font-weight="600" fill="#f1eee2">Codex — api</text>
      <text x="52" y="56" font-size="12" fill="#8f8672">Turn complete: 57 tests green</text>
      <text x="314" y="26" font-size="10.5" letter-spacing="1" text-anchor="end" fill="#8fb87a">DELIVERED</text>
    </g>

    <!-- card 3: suppressed by focus -->
    <g transform="translate(880 258)" opacity="0.5">
      <rect width="330" height="78" rx="14" fill="#1b1710" stroke="#332d1e" stroke-width="1.5" stroke-dasharray="5 5"/>
      <circle cx="30" cy="39" r="7" fill="none" stroke="#857c66" stroke-width="1.5"/>
      <text x="52" y="34" font-size="13.5" font-weight="600" fill="#b9b19c">Gemini CLI</text>
      <text x="52" y="56" font-size="12" fill="#6f6754">You're already looking — logged only</text>
      <text x="314" y="26" font-size="10.5" letter-spacing="1" text-anchor="end" fill="#857c66">SUPPRESSED · FOCUS</text>
    </g>
  </g>
</svg>
